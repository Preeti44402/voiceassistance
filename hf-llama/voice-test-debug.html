<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Voice Demo - Debug Version</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(0,0,0,0.3);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        h1 { text-align: center; }
        button {
            background: linear-gradient(to right, #fa709a 0%, #fee140 100%);
            border: none;
            color: white;
            padding: 15px 30px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 18px;
            font-weight: bold;
            margin: 10px;
        }
        .status-box {
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 15px;
            margin: 20px 0;
            min-height: 100px;
        }
        .debug-info {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            border-radius: 5px;
            font-family: monospace;
            font-size: 12px;
            margin-top: 10px;
        }
        .error { color: #ff6b6b; }
        .success { color: #51cf66; }
        .info { color: #74c0fc; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎤 Voice Recognition Test</h1>
        
        <div id="browserCheck" class="status-box"></div>
        <div id="permissionStatus" class="status-box"></div>
        
        <div style="text-align: center;">
            <button onclick="testVoice()" id="voiceBtn">🎤 Click to Test Voice</button>
        </div>
        
        <div class="status-box">
            <h3>Status:</h3>
            <div id="status">Ready to test...</div>
        </div>
        
        <div class="status-box">
            <h3>What I Heard:</h3>
            <div id="transcript" style="font-size: 18px; font-weight: bold;">-</div>
        </div>
        
        <div class="status-box">
            <h3>Response:</h3>
            <div id="response">-</div>
        </div>
        
        <div class="debug-info" id="debugInfo"></div>
    </div>

    <script>
        const responses = {
            'hi': 'Hello! Nice to meet you!',
            'hello': 'Hello! How can I help you today?',
            'how are you': 'I\'m doing well, thank you for asking!',
            'what can you do': 'I can have conversations and answer questions!',
            'tell me about ai': 'AI stands for Artificial Intelligence!',
            'goodbye': 'Goodbye! It was lovely chatting with you!',
            'thanks': 'You\'re welcome!'
        };

        let recognition = null;
        let isListening = false;

        // Check browser support
        function checkBrowserSupport() {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            const debugDiv = document.getElementById('browserCheck');
            
            if (!SpeechRecognition) {
                debugDiv.innerHTML = '<span class="error">❌ Speech Recognition NOT supported in this browser.</span><br><strong>Please use Chrome, Edge, or Safari.</strong>';
                return null;
            }
            
            debugDiv.innerHTML = '<span class="success">✅ Speech Recognition is supported!</span><br>Browser: ' + navigator.userAgent.split(' ')[0];
            return new SpeechRecognition();
        }

        function testVoice() {
            const statusDiv = document.getElementById('status');
            const transcriptDiv = document.getElementById('transcript');
            const responseDiv = document.getElementById('response');
            const debugDiv = document.getElementById('debugInfo');
            const voiceBtn = document.getElementById('voiceBtn');
            
            // Initialize if not already done
            if (!recognition) {
                recognition = checkBrowserSupport();
                if (!recognition) {
                    statusDiv.innerHTML = '<span class="error">Cannot proceed - browser not supported</span>';
                    return;
                }
                
                setupRecognition();
            }
            
            if (isListening) {
                recognition.stop();
                isListening = false;
                voiceBtn.textContent = '🎤 Click to Test Voice';
                statusDiv.innerHTML = 'Stopped listening';
                return;
            }
            
            try {
                recognition.start();
                isListening = true;
                voiceBtn.textContent = '🔴 Listening... (Click to Stop)';
                statusDiv.innerHTML = '<span class="info">🎤 Listening... Speak now (say "hi", "hello", etc.)</span>';
                transcriptDiv.textContent = '-';
                responseDiv.textContent = '-';
                debugDiv.innerHTML = `Attempting to start recognition...\nTimestamp: ${new Date().toLocaleTimeString()}`;
            } catch (error) {
                statusDiv.innerHTML = `<span class="error">❌ Error: ${error.message}</span>`;
                debugDiv.innerHTML += `\nError starting: ${error.message}\nError type: ${error.name}`;
                
                if (error.message.includes('permission') || error.name.includes('NotAllowed')) {
                    debugDiv.innerHTML += `\n\n⚠️ MICROPHONE PERMISSION DENIED\nPlease allow microphone access in your browser settings.`;
                }
            }
        }

        function setupRecognition() {
            recognition.continuous = false;
            recognition.interimResults = false;
            recognition.lang = 'en-US';
            
            recognition.onstart = function() {
                console.log('Recognition started');
                document.getElementById('debugInfo').innerHTML += '\n✅ Recognition started successfully';
            };
            
            recognition.onresult = function(event) {
                const transcript = event.results[0][0].transcript.toLowerCase().trim();
                document.getElementById('transcript').textContent = `"${transcript}"`;
                document.getElementById('status').innerHTML = '<span class="success">✅ Heard you!</span>';
                document.getElementById('debugInfo').innerHTML += `\n\n✅ Result received: "${transcript}"\nConfidence: ${(event.results[0][0].confidence * 100).toFixed(2)}%`;
                
                // Get response
                let response = 'I heard you but no matching response found.';
                if (responses[transcript]) {
                    response = responses[transcript];
                } else {
                    // Check partial matches
                    for (const [key, value] of Object.entries(responses)) {
                        if (transcript.includes(key) || key.includes(transcript)) {
                            response = value;
                            break;
                        }
                    }
                }
                
                document.getElementById('response').textContent = response;
                
                // Speak the response
                speakResponse(response);
                
                // Reset button
                isListening = false;
                document.getElementById('voiceBtn').textContent = '🎤 Click to Test Voice Again';
            };
            
            recognition.onerror = function(event) {
                console.error('Recognition error:', event);
                const statusDiv = document.getElementById('status');
                const debugDiv = document.getElementById('debugInfo');
                
                statusDiv.innerHTML = `<span class="error">❌ Error: ${event.error}</span>`;
                debugDiv.innerHTML += `\n\n❌ Error occurred: ${event.error}`;
                
                if (event.error === 'not-allowed') {
                    debugDiv.innerHTML += `\n\n⚠️ Permission denied. Please allow microphone access.`;
                } else if (event.error === 'no-speech') {
                    debugDiv.innerHTML += `\n\n⚠️ No speech detected. Try speaking louder or closer to the microphone.`;
                }
                
                isListening = false;
                document.getElementById('voiceBtn').textContent = '🎤 Click to Test Voice';
            };
            
            recognition.onend = function() {
                console.log('Recognition ended');
                document.getElementById('debugInfo').innerHTML += '\n⏹️ Recognition session ended';
                
                if (isListening) {
                    isListening = false;
                    document.getElementById('voiceBtn').textContent = '🎤 Click to Test Voice';
                    document.getElementById('status').innerHTML = 'Stopped (no speech detected)';
                }
            };
        }

        function speakResponse(text) {
            if ('speechSynthesis' in window) {
                const utterance = new SpeechSynthesisUtterance(text);
                utterance.rate = 1.0;
                utterance.pitch = 1.0;
                utterance.volume = 0.8;
                
                utterance.onstart = function() {
                    document.getElementById('status').innerHTML += '<br><span class="info">🔊 Speaking...</span>';
                };
                
                utterance.onend = function() {
                    document.getElementById('status').innerHTML += '<br><span class="success">✅ Done!</span>';
                };
                
                utterance.onerror = function(event) {
                    console.error('Speech synthesis error:', event);
                    document.getElementById('debugInfo').innerHTML += `\n\n🔊 Speech error: ${event.error}`;
                };
                
                window.speechSynthesis.speak(utterance);
            } else {
                document.getElementById('debugInfo').innerHTML += '\n\n⚠️ Text-to-Speech NOT supported';
            }
        }

        // Initialize on page load
        window.onload = function() {
            checkBrowserSupport();
            
            // Add additional debug info
            const debugDiv = document.getElementById('debugInfo');
            debugDiv.innerHTML = `Browser: ${navigator.userAgent}\nLanguage: ${navigator.language}\nPlatform: ${navigator.platform}\nHTTPS: ${location.protocol === 'https:' ? 'Yes' : 'No (localhost is OK)'}\n\n`;
        };
    </script>
</body>
</html>
